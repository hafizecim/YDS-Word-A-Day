name: Gunluk YDS Kelime Botu

on:
  schedule:
    - cron: '0 5 * * *' # Her sabah 08:00 TSİ
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Kelimeyi Sec ve Depoyu Yeniden Adlandir
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 1. Havuzdan rastgele kelime seç (Basit inline python)
        WORD_DATA=$(python3 -c "
        import json, random
        with open('words.json', 'r', encoding='utf-8') as f:
            w = random.choice(json.load(f))
        print(f\"{w['word']}-{w['meaning']}\")
        ")
        
        # GitHub'ın isimlendirme kuralları için boşlukları tireye çevirip temizliyoruz
        CLEAN_NAME=$(echo "YDS-$WORD_DATA" | sed 's/ //g' | sed 's/,,//g' | tr '[:upper:]' '[:lower:]')
        
        echo "Yeni Depo Adi: $CLEAN_NAME"
        
        # 2. GitHub CLI ile depoyu anında yeniden adlandırıyoruz (Bu izin asla engellenmez!)
        gh repo rename "$CLEAN_NAME" --yes
