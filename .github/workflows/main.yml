name: Gunluk YDS Kelime Botu

on:
  schedule:
    - cron: '0 5 * * *' # Her sabah 08:00 TSİ
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Kelimeyi Sec ve Dosyalari Guncelle (Python)
      run: python3 update_word.py

    - name: Degisiklikleri Yukle (Hem SVG hem README)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "github-actions[bot]"
        git add yds_word.svg README.md
        git commit -m "Daily YDS Update (Sync & New Design): $(date +'%Y-%m-%d')" || exit 0
        git push
