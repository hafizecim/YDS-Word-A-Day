name: Gunluk YDS Kelime Botu

on:
  schedule:
    # Her gün Türkiye saati ile sabah 08:00'de çalışır (UTC 05:00)
    - cron: '0 5 * * *'
  workflow_dispatch: # Manuel tetiklemek için

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
    # 1. Depoyu Klonla
    - name: Depoyu Klonla
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

    # 2. Kelimeyi Seç ve Dosyayı Güncelle
    - name: Kelimeyi Güncelle
      run: python3 update_word.py

    # 3. Güncellenen dosyayı depoya push et
    - name: YDS Deposuna Push Et
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "hafizecim"
        git add Gunun_Kelimesi.md
        git commit -m "Daily YDS Word Update: $(date +'%Y-%m-%d')" || exit 0
        git push

    # 4. Sihirli Dokunuş: Profil Durumunu (Status) Değiştir
    - name: Profil Durumunu Guncelle
      env:
        USER_TOKEN: ${{ secrets.STATUS_TOKEN }}
      run: |
        # Gunun_Kelimesi.md dosyasından kelimeyi ve anlamını çekiyoruz
        WORD=$(python3 -c "
        import json, random
        with open('words.json', 'r', encoding='utf-8') as f:
            w = random.choice(json.load(f))
        print(f\"YDS Today: {w['word']} ({w['meaning']})\")
        ")
        
        # GitHub GraphQL API kullanarak durumu güncelliyoruz
        curl -X POST -H "Authorization: bearer $USER_TOKEN" \
          -d "{\"query\": \"mutation { changeUserStatus(input: { message: \\\"$WORD\\\", emoji: \\\":speech_balloon:\\\" }) { status { message } } }\"}" \
          https://api.github.com/graphql
