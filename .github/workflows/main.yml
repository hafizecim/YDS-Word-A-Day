name: Gunluk YDS Kelime Botu

on:
  schedule:
    # Her gün Türkiye saati ile sabah 08:00'de çalışır (UTC 05:00)
    - cron: '0 5 * * *'
  workflow_dispatch: # İstediğin zaman manuel tetiklemek için

permissions:
  contents: write

jobs:
  update-word:
    runs-on: ubuntu-latest
    steps:
    # Eklenti kullanmadan depoyu doğrudan Git komutuyla klonluyoruz
    - name: Depoyu Klonla
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
        
    # İşletim sisteminin içinde zaten var olan Python'ı doğrudan kullanıyoruz
    - name: Kelimeyi Güncelle
      run: python3 update_word.py

    - name: GitHub'a Commit Et ve Gönder
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "hafizecim"
        git add Gunun_Kelimesi.md
        git commit -m "Daily YDS Word Update: $(date +'%Y-%m-%d')" || exit 0
        git push
