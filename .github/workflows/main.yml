name: Gunluk YDS Kelime Botu

on:
  schedule:
    - cron: '0 5 * * *' # Her sabah 08:00 TSİ
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Kelimeyi Seç ve README'yi Güncelle
      run: python3 update_word.py

    - name: Değişiklikleri GitHub'a Yükle
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git commit -m "Daily YDS Word Update: $(date +'%Y-%m-%d')" || exit 0
        git push
